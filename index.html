<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>💎 Emerald Market</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════
     ШАПКА
════════════════════════════════════════ -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">💎</span>
      <span class="logo-text">Emerald Market</span>
    </div>
    <button class="icon-btn" id="btn-search" title="Поиск">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>
</header>

<!-- ═══════════════════════════════════════
     СТРОКА ПОИСКА (скрытая)
════════════════════════════════════════ -->
<div class="search-bar" id="search-bar">
  <input type="text" id="search-input" placeholder="Поиск товаров…" />
  <button id="btn-search-close">✕</button>
</div>

<!-- ═══════════════════════════════════════
     ОСНОВНОЙ КОНТЕНТ
════════════════════════════════════════ -->
<main class="main" id="main-content">

  <!-- ── КАТАЛОГ ─────────────────────────── -->
  <section id="page-catalog" class="page active">

    <!-- Категории -->
    <div class="section-title">Категории</div>
    <div class="categories-grid" id="categories-grid">
      <!-- Заполняется JS -->
    </div>

    <!-- Популярные товары -->
    <div class="section-title" style="margin-top:20px">
      🔥 Популярные
      <span class="section-link" id="btn-see-all">Все →</span>
    </div>
    <div class="products-grid" id="products-popular">
      <!-- Заполняется JS -->
    </div>

  </section>

  <!-- ── ТОВАРЫ КАТЕГОРИИ ────────────────── -->
  <section id="page-category" class="page">
    <div class="page-header">
      <button class="back-btn" id="btn-back-catalog">← Назад</button>
      <h2 id="category-title">Категория</h2>
    </div>
    <div class="products-grid" id="products-category"></div>
    <div class="load-more-wrap">
      <button class="btn-load-more" id="btn-load-more">Загрузить ещё</button>
    </div>
  </section>

  <!-- ── КАРТОЧКА ТОВАРА ─────────────────── -->
  <section id="page-product" class="page">
    <div class="page-header">
      <button class="back-btn" id="btn-back-products">← Назад</button>
    </div>
    <div id="product-detail"></div>
  </section>

  <!-- ── МОИ ЗАКАЗЫ ──────────────────────── -->
  <section id="page-orders" class="page">
    <div class="section-title">📦 Мои заказы</div>
    <div class="tabs">
      <button class="tab active" data-tab="bought">Покупки</button>
      <button class="tab"        data-tab="sold">Продажи</button>
    </div>
    <div id="orders-list"></div>
  </section>

  <!-- ── ИЗБРАННОЕ ───────────────────────── -->
  <section id="page-favorites" class="page">
    <div class="section-title">⭐ Избранное</div>
    <div class="products-grid" id="favorites-list"></div>
  </section>

  <!-- ── ПРОФИЛЬ ─────────────────────────── -->
  <section id="page-profile" class="page">
    <div id="profile-content"></div>
  </section>

</main>

<!-- ═══════════════════════════════════════
     НИЖНЯЯ НАВИГАЦИЯ
════════════════════════════════════════ -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-page="catalog">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
    <span>Каталог</span>
  </button>
  <button class="nav-btn" data-page="orders">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    <span>Заказы</span>
  </button>
  <button class="nav-btn" data-page="favorites">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
    </svg>
    <span>Избранное</span>
  </button>
  <button class="nav-btn" data-page="profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Профиль</span>
  </button>
</nav>

<!-- ═══════════════════════════════════════
     МОДАЛКА ПОКУПКИ
════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-buy">
  <div class="modal">
    <div class="modal-title">💳 Подтверждение покупки</div>
    <div id="modal-buy-content"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="modal-btn-confirm">✅ Подтвердить</button>
      <button class="btn btn-ghost"   id="modal-btn-cancel">Отмена</button>
    </div>
  </div>
</div>

<!-- Toast уведомления -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
